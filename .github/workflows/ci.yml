name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC 13 Debug
            compiler: g++-13
            build-type: Debug
            sanitize: false
          - name: GCC 13 Debug + San
            compiler: g++-13
            build-type: Debug
            sanitize: true
          - name: GCC 13 Release
            compiler: g++-13
            build-type: Release
            sanitize: false
          - name: GCC 14 Debug
            compiler: g++-14
            build-type: Debug
            sanitize: false
          - name: GCC 14 Debug + San
            compiler: g++-14
            build-type: Debug
            sanitize: true
          - name: GCC 14 Release
            compiler: g++-14
            build-type: Release
            sanitize: false
          - name: Clang 18 Debug
            compiler: clang++-18
            build-type: Debug
            sanitize: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake ${{ matrix.compiler }}
          if [[ "${{ matrix.compiler }}" == clang++* ]]; then
            sudo apt-get install -y libc++-18-dev libc++abi-18-dev libunwind-18-dev
          fi

      - name: Configure CMake
        run: |
          SANITIZE_FLAG=""
          if ${{ matrix.sanitize }}; then
            SANITIZE_FLAG="-DENABLE_SANITIZERS=ON"
          fi
          CLANG_FLAGS=""
          if [[ "${{ matrix.compiler }}" == clang++* ]]; then
            CLANG_FLAGS="-DCMAKE_CXX_FLAGS=-stdlib=libc++ -DCMAKE_EXE_LINKER_FLAGS=-lc++abi"
          fi
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            $SANITIZE_FLAG \
            $CLANG_FLAGS

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -j $(nproc)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  coverage:
    name: Coverage (GCC 14)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++-14 lcov bc

      - name: Configure CMake
        run: |
          cmake -B build/coverage -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build/coverage -j $(nproc)

      - name: Run tests
        run: ctest --test-dir build/coverage --output-on-failure -j $(nproc)

      - name: Collect coverage
        run: |
          lcov --capture \
            --directory build/coverage \
            --output-file build/coverage/coverage_raw.info \
            --gcov-tool gcov-14 \
            --ignore-errors mismatch
          lcov --remove build/coverage/coverage_raw.info \
            '/usr/*' \
            '*/_deps/*' \
            --output-file build/coverage/coverage.info

      - name: Check coverage threshold
        run: |
          COVERAGE_PCT=$(lcov --summary build/coverage/coverage.info 2>&1 | grep lines | awk '{print $2}' | tr -d '%')
          echo "Line coverage: ${COVERAGE_PCT}%"
          if [ "$(echo "${COVERAGE_PCT} < 80" | bc)" -eq 1 ]; then
            echo "Coverage ${COVERAGE_PCT}% is below 80% threshold!"
            exit 1
          fi

  clang-tidy:
    name: clang-tidy Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang++-18 clang-tidy-18 libc++-18-dev libc++abi-18-dev libunwind-18-dev

      - name: Configure CMake
        run: |
          cmake -B build/clang-tidy -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy-18;--warnings-as-errors=*" \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-lc++abi"

      - name: Build
        run: cmake --build build/clang-tidy -j $(nproc)

  tsan:
    name: TSan (GCC 14)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake g++-14

      - name: Configure CMake
        run: |
          cmake -B build/tsan -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DENABLE_TSAN=ON

      - name: Build
        run: cmake --build build/tsan -j $(nproc)

      - name: Run tests
        run: ctest --test-dir build/tsan --output-on-failure -j $(nproc)
        env:
          TSAN_OPTIONS: halt_on_error=1:abort_on_error=1

  format-check:
    name: clang-format Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests \( -name '*.cpp' -o -name '*.hpp' \) -print0 | xargs -0 clang-format --dry-run --Werror
